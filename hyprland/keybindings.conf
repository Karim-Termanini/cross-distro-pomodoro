# Pomodoro Timer Keybinds
# Add this to your Hyprland config: source = ~/.config/hypr/UserConfigs/pomodoro-keybinds.conf

$scriptsDir = $HOME/.config/hypr/scripts

bindd = $mainMod ALT, P, Pomodoro Toggle, exec, $scriptsDir/pomodoro.sh toggle
bindd = $mainMod ALT, R, Pomodoro Reset, exec, $scriptsDir/pomodoro.sh reset
